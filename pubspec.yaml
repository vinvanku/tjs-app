name: telangana_jobs_app
description: Telangana Government Jobs notification app for job seekers in Telangana state.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend & Auth
  supabase_flutter: ^2.3.0

  # Push Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.3.0

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.0

  # PDF Viewing
  flutter_pdfview: ^1.3.2

  # Networking
  dio: ^5.4.0

  # File System
  path_provider: ^2.1.2

  # Image Caching
  cached_network_image: ^3.3.1

  # Typography
  google_fonts: ^6.1.0

  # Calendar
  table_calendar: ^3.1.0

  # Loading Animations
  shimmer: ^3.0.0

  # Date Formatting
  intl: ^0.19.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utilities
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
        - asset: assets/fonts/NotoSansTelugu-Bold.ttf
          weight: 700
